<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      width: 420px;
      height: 600px;
      font-family: 'Inter', 'SF Pro Display', 'SF Pro Text', -apple-system, sans-serif;
      background: #0F0F10;
      color: #FFFFFF;
      overflow: hidden;
    }
    
    /* Consolidated Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1C1C1E;
      border-bottom: 1px solid #2C2C2E;
    }
    
    .search-bar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
    }
    
    .search-icon {
      width: 16px;
      height: 16px;
      fill: #8E8E93;
      flex-shrink: 0;
    }
    
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #FFFFFF;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    
    .search-input::placeholder {
      color: #6B6B6B;
    }
    
    .search-stats {
      font-size: 12px;
      color: #6B6B6B;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      position: relative;
    }
    
    .icon-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
    }
    
    .icon-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .icon-btn svg {
      width: 16px;
      height: 16px;
      fill: #8E8E93;
    }
    
    .icon-btn.record svg {
      fill: #FF3B30;
    }
    
    .icon-btn.record.recording::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF3B30;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { 
        transform: scale(1); 
        opacity: 1; 
        box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
      }
      50% { 
        transform: scale(1.1); 
        opacity: 0.9;
        box-shadow: 0 0 0 8px rgba(255, 59, 48, 0);
      }
    }
    
    /* Content Area - Edge to Edge List */
    .content {
      height: calc(600px - 51px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .content::-webkit-scrollbar {
      width: 4px;
    }
    
    .content::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
    }
    
    /* Network Call Item - Flat List Design */
    .call-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #2C2C2E;
      transition: background 0.15s ease;
      cursor: pointer;
      position: relative;
    }
    
    .call-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    
    .call-item:active {
      background: rgba(255, 255, 255, 0.05);
    }
    
    /* Left: Status & Method */
    .call-status {
      width: 60px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    
    .call-method {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    
    .call-method.success {
      color: #34C759;
    }
    
    .call-method.redirect {
      color: #FF9F0A;
    }
    
    .call-method.error {
      color: #FF3B30;
    }
    
    .call-method.pending {
      color: #8E8E93;
    }
    
    .call-status-code {
      font-size: 11px;
      color: #6B6B6B;
      font-variant-numeric: tabular-nums;
    }
    
    /* Center: Endpoint & Resource Type */
    .call-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .call-type-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }
    
    .call-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .call-endpoint {
      font-size: 13px;
      font-weight: 500;
      color: #FFFFFF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .call-domain {
      font-size: 11px;
      color: #6B6B6B;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Right: Timing & Size */
    .call-meta {
      width: 70px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-variant-numeric: tabular-nums;
    }
    
    .call-duration {
      font-size: 12px;
      color: #8E8E93;
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
    }
    
    .call-time {
      font-size: 10px;
      color: #6B6B6B;
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
    }
    
    /* Waterfall Bar */
    .call-waterfall {
      position: absolute;
      bottom: 0;
      left: 76px;
      height: 2px;
      background: linear-gradient(90deg, rgba(10, 132, 255, 0.4), rgba(10, 132, 255, 0.8));
      transition: width 0.3s ease;
    }
    
    .call-item:hover .call-waterfall {
      background: linear-gradient(90deg, rgba(10, 132, 255, 0.6), rgba(10, 132, 255, 1));
    }
    
    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 60px 40px;
      text-align: center;
    }
    
    .empty-state svg {
      width: 48px;
      height: 48px;
      fill: #3A3A3C;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state-title {
      font-size: 15px;
      font-weight: 600;
      color: #8E8E93;
      margin-bottom: 6px;
    }
    
    .empty-state-text {
      font-size: 13px;
      color: #6B6B6B;
      line-height: 1.5;
    }
    
    /* Resource Type Icons */
    .icon-json {
      color: #34C759;
    }
    
    .icon-html {
      color: #FF9F0A;
    }
    
    .icon-image {
      color: #0A84FF;
    }
    
    .icon-css {
      color: #BF5AF2;
    }
    
    .icon-js {
      color: #FFD60A;
    }
    
    .icon-font {
      color: #FF375F;
    }
    
    .icon-other {
      color: #8E8E93;
    }
  </style>
</head>
<body>
  <!-- Consolidated Header -->
  <div class="header">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input 
        type="text" 
        class="search-input" 
        id="searchInput" 
        placeholder="Search network calls..."
      />
      <span class="search-stats" id="searchStats">0 calls</span>
      <div class="header-actions">
        <button class="icon-btn record" id="recordBtn" title="Toggle recording">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8"/>
          </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear all" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
        <button class="icon-btn" id="downloadBtn" title="Download" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Content List -->
  <div class="content" id="content">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <div class="empty-state-title">No network calls</div>
      <div class="empty-state-text">Start recording to capture requests</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
