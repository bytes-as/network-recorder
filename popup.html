<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      width: 420px;
      height: 600px;
      font-family: 'Inter', 'SF Pro Display', 'SF Pro Text', -apple-system, sans-serif;
      background: rgba(28, 28, 30, 1);
      color: #FFFFFF;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(28, 28, 30, 0.98);
      backdrop-filter: blur(40px);
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .title-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3A3A3C;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .status-indicator.recording {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .icon-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
    }
    
    .icon-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: #FFFFFF;
    }
    
    .icon-btn.clear svg {
      fill: #FF3B30;
    }
    
    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8E8E93;
    }
    
    .stat-value {
      font-weight: 600;
      color: #FFFFFF;
    }
    
    /* Control Bar */
    .control-bar {
      padding: 16px 24px;
      background: rgba(20, 20, 22, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .record-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .record-btn.start {
      background: rgba(52, 199, 89, 0.15);
      color: #34C759;
      border: 1px solid rgba(52, 199, 89, 0.3);
    }
    
    .record-btn.start:hover {
      background: rgba(52, 199, 89, 0.25);
    }
    
    .record-btn.stop {
      background: rgba(255, 59, 48, 0.15);
      color: #FF3B30;
      border: 1px solid rgba(255, 59, 48, 0.3);
    }
    
    .record-btn.stop:hover {
      background: rgba(255, 59, 48, 0.25);
    }
    
    .record-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
    
    .search-box {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #FFFFFF;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .search-box:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(10, 132, 255, 0.5);
    }
    
    .search-box::placeholder {
      color: #6B6B6B;
    }
    
    /* Content Area */
    .content {
      height: calc(600px - 130px);
      overflow-y: auto;
      padding: 12px;
    }
    
    .content::-webkit-scrollbar {
      width: 6px;
    }
    
    .content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
    }
    
    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    
    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
    
    /* Network Call Card */
    .call-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .call-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    
    .call-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    
    .method-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .method-badge.GET {
      background: rgba(52, 199, 89, 0.15);
      color: #34C759;
    }
    
    .method-badge.POST {
      background: rgba(10, 132, 255, 0.15);
      color: #0A84FF;
    }
    
    .method-badge.PUT {
      background: rgba(255, 159, 10, 0.15);
      color: #FF9F0A;
    }
    
    .method-badge.DELETE {
      background: rgba(255, 59, 48, 0.15);
      color: #FF3B30;
    }
    
    .status-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .status-badge.success {
      background: rgba(52, 199, 89, 0.15);
      color: #34C759;
    }
    
    .status-badge.error {
      background: rgba(255, 59, 48, 0.15);
      color: #FF3B30;
    }
    
    .call-url {
      font-size: 13px;
      color: #FFFFFF;
      word-break: break-all;
      line-height: 1.4;
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
    }
    
    .call-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: #8E8E93;
    }
    
    .call-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #6B6B6B;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      fill: #3A3A3C;
      margin-bottom: 16px;
    }
    
    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      color: #8E8E93;
      margin-bottom: 8px;
    }
    
    .empty-state-text {
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="title-section">
        <div class="status-indicator" id="statusIndicator"></div>
        <h1 class="title">Network Recorder</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="Clear all calls" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
        <button class="icon-btn" id="downloadBtn" title="Download data" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="stats">
      <div class="stat-item">
        <span>Total:</span>
        <span class="stat-value" id="totalCount">0</span>
      </div>
      <div class="stat-item">
        <span>Filtered:</span>
        <span class="stat-value" id="filteredCount">0</span>
      </div>
    </div>
  </div>
  
  <div class="control-bar">
    <button class="record-btn start" id="recordBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="8"/>
      </svg>
      <span id="recordBtnText">Start Recording</span>
    </button>
    <input 
      type="text" 
      class="search-box" 
      id="searchBox" 
      placeholder="Search URLs..."
    />
  </div>
  
  <div class="content" id="content">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <div class="empty-state-title">No network calls recorded</div>
      <div class="empty-state-text">Click "Start Recording" to begin capturing network requests</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
